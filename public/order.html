<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order — The Downtown Cafe</title>
    <meta name="description" content="Place your order directly from your table at The Downtown Cafe.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-order">

    <!-- Order Header (no standard navbar) -->
    <header class="order-header">
        <div class="order-header-inner">
            <div class="order-logo">
                <span class="logo-icon">☕</span>
                <div>
                    <span class="order-brand">The Downtown Cafe</span>
                    <span class="order-table-info" id="tableInfo">Table #--</span>
                </div>
            </div>
            <button class="cart-toggle" id="cartToggle">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- No table parameter error -->
    <div class="order-error" id="noTableError" style="display:none;">
        <div class="error-content">
            <h2>Scan a Table QR Code</h2>
            <p>Please scan the QR code on your table to start ordering.</p>
            <a href="/" class="btn btn-primary">Go to Home</a>
        </div>
    </div>

    <!-- Main two-column layout -->
    <div class="order-layout" id="orderLayout" style="display:none;">
        <!-- Left: Menu browsing -->
        <main class="order-menu-section">
            <!-- Category filter chips -->
            <div class="category-chips" id="categoryChips">
                <!-- Populated by JS -->
            </div>

            <!-- Search -->
            <div class="order-search">
                <input type="text" id="menuSearch" placeholder="Search dishes..." class="search-input">
            </div>

            <!-- Filter: Veg Only toggle -->
            <div class="order-filters">
                <label class="toggle-label">
                    <input type="checkbox" id="vegFilter">
                    <span class="toggle-switch"></span>
                    Veg Only
                </label>
            </div>

            <!-- Menu items grid -->
            <div id="orderMenuGrid" class="order-menu-grid">
                <!-- Each category section with items - populated by JS -->
            </div>
        </main>

        <!-- Right: Cart sidebar -->
        <aside class="order-cart" id="orderCart">
            <div class="cart-header">
                <h3>Your Order</h3>
                <span id="cartTableLabel">Table #--</span>
            </div>

            <div class="cart-items" id="cartItems">
                <div class="cart-empty" id="cartEmpty">
                    <p>Your cart is empty</p>
                    <span>Add items from the menu</span>
                </div>
            </div>

            <div class="cart-footer" id="cartFooter" style="display:none;">
                <div class="cart-subtotal">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">₹0</span>
                </div>
                <div class="cart-gst">
                    <span>GST (5%)</span>
                    <span id="cartGST">₹0</span>
                </div>
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cartTotal">₹0</span>
                </div>

                <div class="form-group">
                    <input type="text" id="customerName" placeholder="Your name (optional)" class="cart-name-input">
                </div>

                <button class="btn btn-primary btn-full btn-lg" id="placeOrderBtn">
                    Place Order
                </button>
            </div>
        </aside>
    </div>

    <!-- Mobile cart overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- Order confirmation view -->
    <div class="order-success" id="orderSuccess" style="display:none;">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h2>Order Placed!</h2>
            <p>Your order has been sent to the kitchen.</p>
            <div class="order-summary" id="orderSummary">
                <!-- Populated by JS: order number, items, total -->
            </div>
            <button class="btn btn-primary" onclick="location.reload()">Order More</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/common.js"></script>
    <script src="/js/order.js"></script>
</body>
</html>
