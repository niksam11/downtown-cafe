services:
  - type: web
    name: downtown-cafe
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/cafe.db
    disk:
      name: cafe-data
      mountPath: /var/data
      sizeGB: 1
